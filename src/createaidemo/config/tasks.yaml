research_task:
  description: >
    对 {topic} 进行全面研究。当前年份是 {current_year}。
    **重要：必须使用搜索工具获取最新信息。**
    **信源优先级：**
    - 首选：官方机构（如政府、国际组织）、学术论文、知名行业分析师报告（如 Gartner、Forrester、麦肯锡）。
    - 次选：权威科技媒体（如 TechCrunch、The Verge、Ars Technica）、知名企业官方博客（如 Google Cloud、Microsoft 技术博客）。
    - 谨慎使用：普通新闻媒体综合报道、自媒体、单一信源案例。
    如果搜索结果中缺乏权威数据或具体案例，请在报告中明确说明“当前未找到公开的权威数据”或“以下为基于行业讨论的趋势分析”。
    对于来自单一信源或媒体转述的案例，需标注“（需进一步验证）”。
    不要编造公司名称、产品名或精确数据。
  expected_output: >
    一份包含 10 个要点的列表，每个要点包括：
    1. 具体发现（如技术突破、应用场景、行业动态）；
    2. 信息来源（注明信源类型及名称，如“根据 Gartner 2026 年预测报告”或“根据 Google Cloud 官网博客”）；若为单一信源案例，需补充“（需进一步验证）”。
    3. 若为推测或趋势，请标注“（行业趋势分析）”。
  agent: researcher

writing_task:
  description: >
    回顾研究任务的结果，将每个要点扩展为报告的完整章节。
    **写作原则：**
    - 每个章节必须基于研究任务中给出的要点，不可自行添加虚构案例或数字。
    - 如果原始要点中包含“未找到权威数据”或“趋势分析”，请在报告中如实体现，并保持措辞谨慎（如“部分观点认为…”、“目前尚未有公开数据证实…”）。
    - 技术解释应使用通用术语，避免依赖特定未经验证的品牌或产品。
    - 优先引用可量化的技术指标或基准数据（若研究任务提供），如“据XX报告，某技术可将推理效率提升X%”；若无量化数据，则以“有分析指出”、“据行业观察”等措辞描述趋势。
  expected_output: >
    一份详细的 Markdown 技术报告，结构如下：
    - 执行摘要（基于研究结果总结）
    - 主要发现（按要点展开，每个发现附带来源说明，并标注验证状态）
    - 实施建议（基于已知信息提出，若信息不足则说明局限性）
    代码示例可以使用通用伪代码或公认框架，无需与虚构案例绑定。
  agent: writer

editing_task:
  description: >
    对撰写好的报告进行润色，重点检查：
    - 语法与格式
    - 逻辑连贯性
    - 是否严格遵循研究任务提供的要点
    - 是否所有非通用事实都标注了来源
    - 是否有夸张或绝对化表述（如“100%”、“全面”、“革命性”），若有则改为更谨慎的措辞或添加限制说明
    - 对于来源标注为“需进一步验证”的内容，添加“审核备注”进行特别说明
    - 对于来自单一信源或媒体转述的关键案例，添加“审核备注：该信息源自XX，请读者注意核实”
  expected_output: >
    一份经过润色、格式规范的 Markdown 文档，内容真实、严谨，并包含必要的审核备注。
    最终报告将保存为 report.md。
  agent: editor